<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p class="tittle">Rock Paper Scissors</p>
    <button onclick = "playGame('rock')" class="move-btn">
      <img src="asset/rock-emoji.png" class="move-icon">
    </button>
    <button onclick = "playGame('paper')" class="move-btn">
      <img src="asset/paper-emoji.png" class="move-icon">
    </button>
    <button onclick = "playGame('scissors')" class="move-btn">
      <img src="asset/scissors-emoji.png" class="move-icon">
    </button>
      <p class="js-result result" ></p>
      <p class="js-move">
        
      </p>
   <p class="js-score score"></p>

    <button onclick = 
    "score.win=0; score.lose=0; score.tie=0;
    localStorage.removeItem('score')
    updateScoreElement()"class="reset-btn"
    >Reset Score</button>
  
    <script src="javaScript.js"></script>
   
</body>
</html>
